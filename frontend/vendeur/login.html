<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="application-name" content="WhaBiz">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WhaBiz">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0F9D58">
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search || '');
        var isPwaLaunch = params.get('source') === 'pwa'
          || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
          || window.navigator.standalone === true;

        if (!isPwaLaunch) return;

        localStorage.setItem('whabizLaunchTarget', 'vendeur');

        var hasVendor = Boolean(localStorage.getItem('vendeurToken') && localStorage.getItem('vendeurId'));
        if (hasVendor) {
          window.location.replace('/vendeur/dashboard');
        }
      } catch (error) {}
    })();
  </script>
  <title>Connexion Vendeur - WhaBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pwa-install.css">
  <link rel="stylesheet" href="/pwa-launch.css">
  <link rel="stylesheet" href="/pwa-network.css">
  <link rel="stylesheet" href="/pwa-update.css">
  <script src="/pwa-install.js" defer></script>
  <script src="/pwa-launch.js" defer></script>
  <script src="/pwa-network.js" defer></script>
  <script src="/pwa-update.js" defer></script>
  <style>
    :root {
      --premium-green:      #0F9D58;
      --premium-green-dark: #0B7A43;
      --premium-gold:       #D4AF37;
      --shadow-md:          0 4px 16px rgba(0,0,0,.12);
      --shadow-lg:          0 8px 32px rgba(0,0,0,.16);
      --radius-md:          12px;
      --radius-lg:          16px;
      --font-display:       'Outfit', sans-serif;
      --font-body:          'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: #0a0e14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(15,157,88,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(212,175,55,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--premium-green) 0%, var(--premium-gold) 100%);
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 30px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(15,157,88,.3);
      margin-bottom: 16px;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: rgba(255,255,255,.6);
      font-size: 14px;
    }

    .login-card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 15px;
      color: #fff;
      background: rgba(255,255,255,.05);
      transition: all .25s;
      outline: none;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,.4);
    }

    .form-input:focus {
      border-color: var(--premium-green);
      background: rgba(255,255,255,.08);
      box-shadow: 0 0 0 3px rgba(15,157,88,.15);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--premium-green) 0%, var(--premium-gold) 100%);
      color: #000;
      border: none;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(15,157,88,.4);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(15,157,88,.6);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .alert {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      color: #FCA5A5;
    }

    .alert-success {
      background: rgba(15,157,88,.15);
      border: 1px solid rgba(15,157,88,.3);
      color: var(--premium-green);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,.5);
      font-size: 13px;
    }

    .login-footer a {
      color: var(--premium-green);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .forgot-password {
      text-align: center;
      margin-top: 16px;
    }

    .forgot-password a {
      color: var(--premium-green);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn-login.loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }

    .password-toggle-btn:hover {
      color: rgba(255,255,255,.8);
    }

    .help-text {
      color: rgba(255,255,255,.5);
      font-size: 12px;
      margin-top: 6px;
    }
  </style>
  <link rel="stylesheet" href="vendeur-ui.css">
</head>
<body>

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">W</div>
      <h1 class="login-title">Espace Vendeur</h1>
      <p class="login-subtitle">Connectez-vous pour gérer votre boutique</p>
    </div>

    <div class="login-card">
      <div id="alert" class="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Numéro WhatsApp</label>
          <input 
            type="tel" 
            class="form-input" 
            id="telInput" 
            placeholder="+226 XX XX XX XX"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div class="password-toggle">
            <input 
              type="password" 
              class="form-input" 
              id="passwordInput" 
              placeholder="Entrez votre mot de passe"
              required
            >
            <button type="button" class="password-toggle-btn" onclick="togglePassword()">👁️</button>
          </div>
          <div class="help-text">Mot de passe vendeur. Pour un nouveau compte, utilisez l'inscription vendeur.</div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          Se connecter
        </button>

        <div class="forgot-password">
          <a href="/vendeur/recovery">🔑 Mot de passe oublié ?</a>
        </div>
      </form>

      <div class="login-footer">
        Pas encore inscrit ? <a href="/vendeur/signup">Creer mon espace vendeur</a><br>
        Besoin d'aide ? <a href="/support">Contacter le support</a>
      </div>
    </div>
  </div>

  <script>
    var form = document.getElementById('loginForm');
    var btnLogin = document.getElementById('btnLogin');
    var alert = document.getElementById('alert');

    function togglePassword() {
      var input = document.getElementById('passwordInput');
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }

    function showAlert(message, type) {
      alert.className = 'alert alert-' + type + ' show';
      alert.textContent = message;
      setTimeout(function() {
        alert.classList.remove('show');
      }, 5000);
    }

    function shouldShowOnboarding(checklist) {
      if (!checklist || !Array.isArray(checklist.steps)) return false;
      var profil = checklist.steps.find(function (step) { return step.id === 'profil'; });
      var catalogue = checklist.steps.find(function (step) { return step.id === 'catalogue'; });
      return Boolean((profil && !profil.done) || (catalogue && !catalogue.done));
    }

    async function resolvePostLoginUrl(data) {
      var vendeur = data && data.vendeur ? data.vendeur : null;
      var token = data && data.token ? data.token : '';
      if (!vendeur || !vendeur.id || !token) return '/vendeur/dashboard';

      var skipped = localStorage.getItem('whabizOnboardingSkipped:' + vendeur.id) === '1';
      if (skipped) return '/vendeur/dashboard';

      try {
        var res = await fetch('/api/vendeurs/' + encodeURIComponent(vendeur.id) + '/dashboard?periodDays=30', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) return '/vendeur/dashboard';
        var payload = await res.json();
        return shouldShowOnboarding(payload.checklist) ? '/vendeur/onboarding' : '/vendeur/dashboard';
      } catch (error) {
        return '/vendeur/dashboard';
      }
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      var tel = document.getElementById('telInput').value.trim();
      var password = document.getElementById('passwordInput').value;

      if (!tel || !password) {
        showAlert('Veuillez remplir tous les champs', 'error');
        return;
      }

      btnLogin.classList.add('loading');
      btnLogin.textContent = 'Connexion en cours';

      try {
        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tel: tel, password: password })
        });

        var data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Erreur de connexion', 'error');
          btnLogin.classList.remove('loading');
          btnLogin.textContent = 'Se connecter';
          return;
        }

        showAlert('Connexion réussie !', 'success');

        localStorage.setItem('vendeurToken', data.token);
        localStorage.setItem('vendeurId', data.vendeur.id);
        localStorage.setItem('vendeurNom', data.vendeur.nom);
        localStorage.setItem('vendeurBoutique', data.vendeur.boutique);
        localStorage.setItem('vendeurSlug', data.vendeur.slug || '');
        localStorage.setItem('whabizLaunchTarget', 'vendeur');
        var destination = await resolvePostLoginUrl(data);

        setTimeout(function() {
          window.location.href = destination;
        }, 1000);

      } catch (error) {
        console.error('Erreur:', error);
        showAlert('Erreur de connexion. Réessayez.', 'error');
        btnLogin.classList.remove('loading');
        btnLogin.textContent = 'Se connecter';
      }
    });
  </script>

</body>
</html>
