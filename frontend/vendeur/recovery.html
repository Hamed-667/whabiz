<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="application-name" content="WhaBiz">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WhaBiz">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0F9D58">
  <title>Récupération - WhaBiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pwa-install.css">
  <script src="/pwa-install.js" defer></script>
  <style>
    :root {
      --premium-green:      #0F9D58;
      --premium-green-dark: #0B7A43;
      --premium-gold:       #D4AF37;
      --shadow-md:          0 4px 16px rgba(0,0,0,.12);
      --shadow-lg:          0 8px 32px rgba(0,0,0,.16);
      --radius-md:          12px;
      --radius-lg:          16px;
      --font-display:       'Outfit', sans-serif;
      --font-body:          'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: #0a0e14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(15,157,88,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(212,175,55,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .recovery-container {
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
    }

    .recovery-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--premium-green) 0%, var(--premium-gold) 100%);
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 30px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(15,157,88,.3);
      margin-bottom: 16px;
    }

    .recovery-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .recovery-subtitle {
      color: rgba(255,255,255,.6);
      font-size: 14px;
    }

    .recovery-card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,.9);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 15px;
      color: #fff;
      background: rgba(255,255,255,.05);
      transition: all .25s;
      outline: none;
    }

    .form-input::placeholder {
      color: rgba(255,255,255,.4);
    }

    .form-input:focus {
      border-color: var(--premium-green);
      background: rgba(255,255,255,.08);
      box-shadow: 0 0 0 3px rgba(15,157,88,.15);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--premium-green) 0%, var(--premium-gold) 100%);
      color: #000;
      box-shadow: 0 4px 20px rgba(15,157,88,.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(15,157,88,.6);
    }

    .btn-secondary {
      background: rgba(255,255,255,.1);
      color: #fff;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,.15);
    }

    .recovery-methods {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .method-btn {
      padding: 20px;
      background: rgba(255,255,255,.05);
      border: 2px solid rgba(255,255,255,.1);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }

    .method-btn:hover {
      background: rgba(255,255,255,.08);
      border-color: var(--premium-green);
    }

    .method-btn.selected {
      background: rgba(15,157,88,.15);
      border-color: var(--premium-green);
    }

    .method-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .method-label {
      font-size: 14px;
      font-weight: 600;
    }

    .alert {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      color: #FCA5A5;
    }

    .alert-success {
      background: rgba(15,157,88,.15);
      border: 1px solid rgba(15,157,88,.3);
      color: var(--premium-green);
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--premium-green);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
  <link rel="stylesheet" href="vendeur-ui.css">
</head>
<body>

  <div class="recovery-container">
    <div class="recovery-logo">
      <div class="logo-icon">🔑</div>
      <h1 class="recovery-title">Récupération</h1>
      <p class="recovery-subtitle">Réinitialisez votre mot de passe</p>
    </div>

    <div class="recovery-card">
      <div id="alert" class="alert"></div>

      
      <div class="step active" id="step1">
        <div class="form-group">
          <label class="form-label">Votre numéro WhatsApp</label>
          <input type="tel" class="form-input" id="telStep1" placeholder="+226 XX XX XX XX" required>
        </div>

        <div class="form-group">
          <label class="form-label">Comment voulez-vous recevoir le code ?</label>
          <div class="recovery-methods">
            <div class="method-btn selected" data-method="whatsapp" onclick="selectMethod('whatsapp')">
              <div class="method-icon">💬</div>
              <div class="method-label">WhatsApp</div>
            </div>
            <div class="method-btn" data-method="email" onclick="selectMethod('email')">
              <div class="method-icon">📧</div>
              <div class="method-label">Email</div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary" onclick="sendCode()">Envoyer le code</button>
      </div>

      
      <div class="step" id="step2">
        <div class="form-group">
          <label class="form-label">Code de récupération</label>
          <input type="text" class="form-input" id="codeInput" placeholder="123456" required>
        </div>

        <div class="form-group">
          <label class="form-label">Nouveau mot de passe</label>
          <input type="password" class="form-input" id="newPassword" placeholder="Min 6 caractères" required>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmez le mot de passe</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="Retapez le mot de passe" required>
        </div>

        <button class="btn btn-primary" onclick="resetPassword()">Réinitialiser</button>
        <button class="btn btn-secondary" onclick="goToStep(1)">← Retour</button>
      </div>

      <div class="back-link">
        <a href="/vendeur">← Retour à la connexion</a>
      </div>
    </div>
  </div>

  <script>
    var selectedMethod = 'whatsapp';
    var userTel = '';

    function selectMethod(method) {
      selectedMethod = method;
      document.querySelectorAll('.method-btn').forEach(function(btn) {
        btn.classList.remove('selected');
      });
      document.querySelector('[data-method="' + method + '"]').classList.add('selected');
    }

    function showAlert(message, type) {
      var alert = document.getElementById('alert');
      alert.className = 'alert alert-' + type + ' show';
      alert.textContent = message;
      setTimeout(function() {
        alert.classList.remove('show');
      }, 5000);
    }

    function goToStep(step) {
      document.querySelectorAll('.step').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('step' + step).classList.add('active');
    }

    async function sendCode() {
      var tel = document.getElementById('telStep1').value.trim();

      if (!tel) {
        showAlert('Veuillez entrer votre numéro WhatsApp', 'error');
        return;
      }

      userTel = tel;

      try {
        var res = await fetch('/api/auth/request-recovery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tel: tel, method: selectedMethod })
        });

        var data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Erreur', 'error');
          return;
        }

        if (selectedMethod === 'whatsapp') {
          if (data.whatsappUrl) {
            window.open(data.whatsappUrl, '_blank');
          }
          if (data.debugCode) {
            showAlert('Code de debug: ' + data.debugCode, 'success');
          } else {
            showAlert('Code envoyé. Vérifiez votre canal WhatsApp.', 'success');
          }
        } else {
          if (data.debugCode) {
            showAlert('Code de debug: ' + data.debugCode, 'success');
          } else {
            showAlert('Code envoyé par email.', 'success');
          }
        }

        setTimeout(function() {
          goToStep(2);
        }, 1500);

      } catch (error) {
        console.error('Erreur:', error);
        showAlert('Erreur de connexion', 'error');
      }
    }

    async function resetPassword() {
      var code = document.getElementById('codeInput').value.trim();
      var newPass = document.getElementById('newPassword').value;
      var confirmPass = document.getElementById('confirmPassword').value;

      if (!code || !newPass || !confirmPass) {
        showAlert('Veuillez remplir tous les champs', 'error');
        return;
      }

      if (newPass.length < 6) {
        showAlert('Le mot de passe doit contenir au moins 6 caractères', 'error');
        return;
      }

      if (newPass !== confirmPass) {
        showAlert('Les mots de passe ne correspondent pas', 'error');
        return;
      }

      try {
        var res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tel: userTel, code: code, newPassword: newPass })
        });

        var data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Erreur', 'error');
          return;
        }

        showAlert('Mot de passe réinitialisé !', 'success');

        setTimeout(function() {
          window.location.href = '/vendeur';
        }, 2000);

      } catch (error) {
        console.error('Erreur:', error);
        showAlert('Erreur de connexion', 'error');
      }
    }
  </script>

</body>
</html>
