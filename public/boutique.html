<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Boutique</title>
  
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F9D58">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    
    var slug = window.location.pathname.substring(1);
    var savedTheme = localStorage.getItem('shopTheme_' + slug);
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
  </script>
  <style>
    :root {
      --premium-green:      #0F9D58;
      --premium-green-dark: #0B7A43;
      --premium-black:      #111827;
      --premium-gold:       #D4AF37;
      --bg-primary:         #0a0e14;
      --bg-secondary:       rgba(10,14,20,.95);
      --shadow-sm:          0 2px 8px rgba(0,0,0,.08);
      --shadow-md:          0 4px 16px rgba(0,0,0,.12);
      --shadow-lg:          0 8px 32px rgba(0,0,0,.16);
      --radius-md:          12px;
      --radius-lg:          16px;
      --font-display:       'Outfit', sans-serif;
      --font-body:          'DM Sans', sans-serif;
    }

    
    [data-theme="dark-blue"] {
      --premium-green: #3B82F6;
      --premium-green-dark: #2563EB;
      --premium-gold: #8B5CF6;
      --bg-primary: #0f172a;
    }

    [data-theme="dark-purple"] {
      --premium-green: #A855F7;
      --premium-green-dark: #9333EA;
      --premium-gold: #EC4899;
      --bg-primary: #1e1b4b;
    }

    [data-theme="dark-orange"] {
      --premium-green: #F97316;
      --premium-green-dark: #EA580C;
      --premium-gold: #FBBF24;
      --bg-primary: #1c1917;
    }

    [data-theme="dark-red"] {
      --premium-green: #EF4444;
      --premium-green-dark: #DC2626;
      --premium-gold: #F59E0B;
      --bg-primary: #1f1410;
    }

    [data-theme="dark-teal"] {
      --premium-green: #14B8A6;
      --premium-green-dark: #0D9488;
      --premium-gold: #06B6D4;
      --bg-primary: #0d1b1e;
    }

    [data-theme="light-modern"] {
      --premium-green: #0F9D58;
      --premium-green-dark: #0B7A43;
      --premium-gold: #D4AF37;
      --bg-primary: #ffffff;
      --bg-secondary: rgba(255,255,255,.95);
    }

    [data-theme="light-blue"] {
      --premium-green: #2563EB;
      --premium-green-dark: #1D4ED8;
      --premium-gold: #7C3AED;
      --bg-primary: #f8fafc;
      --bg-secondary: rgba(248,250,252,.95);
    }

    
    [data-theme="light-modern"],
    [data-theme="light-blue"] {
      color: #1f2937;
    }

    [data-theme="light-modern"] .header,
    [data-theme="light-blue"] .header {
      background: var(--bg-secondary);
      border-bottom-color: rgba(0,0,0,.1);
    }

    [data-theme="light-modern"] body::before,
    [data-theme="light-blue"] body::before {
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(var(--premium-green-rgb, 15,157,88), 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(var(--premium-gold-rgb, 212,175,55), 0.05) 0%, transparent 50%);
    }

    
    [data-theme="light-modern"] *,
    [data-theme="light-blue"] * {
      color: #1f2937;
    }

    [data-theme="light-modern"] .shop-name,
    [data-theme="light-blue"] .shop-name,
    [data-theme="light-modern"] .shop-info h1,
    [data-theme="light-blue"] .shop-info h1,
    [data-theme="light-modern"] .products-title,
    [data-theme="light-blue"] .products-title,
    [data-theme="light-modern"] .product-name,
    [data-theme="light-blue"] .product-name {
      color: #1f2937 !important;
    }

    [data-theme="light-modern"] .product-description,
    [data-theme="light-blue"] .product-description,
    [data-theme="light-modern"] .shop-info p,
    [data-theme="light-blue"] .shop-info p,
    [data-theme="light-modern"] .products-count,
    [data-theme="light-blue"] .products-count {
      color: #6b7280 !important;
    }

    [data-theme="light-modern"] .product-card,
    [data-theme="light-blue"] .product-card {
      background: rgba(255,255,255,.8);
      border-color: rgba(0,0,0,.1);
    }

    [data-theme="light-modern"] .product-card:hover,
    [data-theme="light-blue"] .product-card:hover {
      background: rgba(255,255,255,.95);
      border-color: var(--premium-green);
    }

    [data-theme="light-modern"] .shop-info,
    [data-theme="light-blue"] .shop-info {
      background: rgba(255,255,255,.8);
      border-color: rgba(0,0,0,.1);
    }

    [data-theme="light-modern"] .whatsapp-btn,
    [data-theme="light-blue"] .whatsapp-btn {
      color: #fff !important;
    }

    [data-theme="light-modern"] .add-to-cart-btn,
    [data-theme="light-blue"] .add-to-cart-btn {
      color: #fff !important;
    }

    [data-theme="light-modern"] .cart-btn,
    [data-theme="light-blue"] .cart-btn {
      background: rgba(0,0,0,.1);
      color: #1f2937 !important;
    }

    [data-theme="light-modern"] .quick-order-btn,
    [data-theme="light-blue"] .quick-order-btn {
      background: rgba(0,0,0,.05);
      color: #1f2937 !important;
    }

    [data-theme="light-modern"] .review-btn,
    [data-theme="light-blue"] .review-btn {
      color: var(--premium-gold) !important;
    }

    [data-theme="light-modern"] .footer,
    [data-theme="light-blue"] .footer {
      background: #f3f4f6;
    }

    [data-theme="light-modern"] .footer p,
    [data-theme="light-blue"] .footer p,
    [data-theme="light-modern"] .powered-by,
    [data-theme="light-blue"] .powered-by {
      color: #6b7280 !important;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: #fff;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(15,157,88,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(212,175,55,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      background: var(--bg-secondary);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.1);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .shop-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .shop-icon {
      font-size: 32px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-btn {
      position: relative;
      background: rgba(255,255,255,.1);
      color: #fff;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all .2s;
    }

    .cart-btn:hover {
      background: rgba(255,255,255,.15);
      transform: scale(1.05);
    }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #EF4444;
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #0a0e14;
    }

    .whatsapp-btn {
      background: var(--premium-green);
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all .2s;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .whatsapp-btn:hover {
      background: var(--premium-green-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(15,157,88,.4);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .shop-info {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 40px;
      text-align: center;
    }

    .shop-info h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--premium-green) 0%, var(--premium-gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .shop-info p {
      color: rgba(255,255,255,.7);
      font-size: 16px;
    }

    .products-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .products-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .products-count {
      color: rgba(255,255,255,.6);
      font-size: 14px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 60px;
    }

    .product-card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all .3s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      background: rgba(255,255,255,.08);
      border-color: var(--premium-green);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(15,157,88,.3);
    }

    .product-images {
      position: relative;
      width: 100%;
      height: 200px;
      background: rgba(255,255,255,.05);
      cursor: pointer;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .images-indicator {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,.7);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .product-info {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .product-category {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(15,157,88,.2);
      border: 1px solid rgba(15,157,88,.3);
      color: var(--premium-green);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .category-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .category-filter-btn {
      padding: 10px 20px;
      border-radius: 50px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-size: 14px;
    }

    .category-filter-btn:hover {
      background: rgba(255,255,255,.1);
      color: #fff;
    }

    .category-filter-btn.active {
      background: var(--premium-green);
      border-color: var(--premium-green);
      color: #fff;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .stars {
      font-size: 14px;
      line-height: 1;
    }

    .rating-text {
      font-size: 13px;
      color: rgba(255,255,255,.6);
    }

    .review-btn {
      width: 100%;
      padding: 10px;
      background: rgba(212,175,55,.2);
      border: 1px solid rgba(212,175,55,.3);
      color: var(--premium-gold);
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-size: 14px;
      margin-top: 12px;
    }

    .review-btn:hover {
      background: rgba(212,175,55,.3);
      transform: translateY(-2px);
    }

    .rating-input {
      display: flex;
      gap: 8px;
    }

    .rating-star {
      font-size: 32px;
      cursor: pointer;
      transition: transform .2s;
    }

    .rating-star:hover {
      transform: scale(1.2);
    }

    .product-description {
      font-size: 14px;
      color: rgba(255,255,255,.7);
      margin-bottom: 16px;
      flex: 1;
      line-height: 1.5;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      gap: 12px;
    }

    .product-price {
      font-size: 24px;
      font-weight: 800;
      font-family: var(--font-display);
      color: var(--premium-green);
    }

    .product-actions {
      display: flex;
      gap: 8px;
    }

    .add-to-cart-btn {
      background: var(--premium-green);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .add-to-cart-btn:hover {
      background: var(--premium-green-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(15,157,88,.4);
    }

    .quick-order-btn {
      background: rgba(255,255,255,.1);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .quick-order-btn:hover {
      background: rgba(255,255,255,.15);
    }

    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: rgba(10,14,20,.98);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      margin: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all .2s;
    }

    .modal-close:hover {
      background: rgba(255,255,255,.1);
    }

    
    .cart-empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,.5);
    }

    .cart-empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .cart-items {
      margin-bottom: 24px;
    }

    .cart-item {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      transition: all .2s;
    }

    .cart-item:hover {
      background: rgba(255,255,255,.08);
    }

    .cart-item-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--radius-md);
      flex-shrink: 0;
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cart-item-price {
      font-size: 14px;
      color: var(--premium-green);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px;
      padding: 4px;
    }

    .quantity-btn {
      background: none;
      border: none;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all .2s;
    }

    .quantity-btn:hover {
      background: rgba(255,255,255,.1);
    }

    .quantity-value {
      min-width: 32px;
      text-align: center;
      font-weight: 600;
    }

    .cart-item-remove {
      background: none;
      border: none;
      color: #EF4444;
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
      transition: all .2s;
    }

    .cart-item-remove:hover {
      transform: scale(1.2);
    }

    .cart-total {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .cart-total-row:last-child {
      margin-bottom: 0;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.1);
      font-size: 20px;
      font-weight: 800;
      color: var(--premium-green);
    }

    .cart-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-order-all {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--premium-green) 0%, var(--premium-gold) 100%);
      color: #000;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-order-all:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(15,157,88,.6);
    }

    .btn-clear-cart {
      width: 100%;
      padding: 12px;
      background: rgba(239,68,68,.2);
      color: #FCA5A5;
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-clear-cart:hover {
      background: rgba(239,68,68,.3);
    }

    
    .gallery-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,.95);
      z-index: 1500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .gallery-modal.show {
      display: flex;
    }

    .gallery-content {
      max-width: 900px;
      width: 100%;
      position: relative;
    }

    .gallery-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .gallery-close:hover {
      transform: scale(1.2);
    }

    .gallery-main {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: rgba(255,255,255,.05);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.7);
      color: #fff;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all .2s;
    }

    .gallery-nav:hover {
      background: rgba(0,0,0,.9);
      transform: translateY(-50%) scale(1.1);
    }

    .gallery-prev {
      left: 16px;
    }

    .gallery-next {
      right: 16px;
    }

    .gallery-thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 12px;
    }

    .gallery-thumb {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .2s;
      opacity: 0.6;
    }

    .gallery-thumb:hover,
    .gallery-thumb.active {
      border-color: var(--premium-green);
      opacity: 1;
    }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-counter {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.7);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: rgba(255,255,255,.8);
    }

    .empty-state p {
      color: rgba(255,255,255,.5);
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,.1);
      border-top-color: var(--premium-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      background: var(--premium-black);
      padding: 32px 24px;
      text-align: center;
      margin-top: 60px;
    }

    .footer p {
      color: rgba(255,255,255,.6);
      font-size: 14px;
    }

    .powered-by {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,.4);
      font-size: 13px;
    }

    .powered-by strong {
      color: var(--premium-green);
    }

    @media (max-width: 768px) {
      .header-inner {
        flex-wrap: wrap;
        gap: 12px;
      }

      .shop-name {
        font-size: 20px;
      }

      .shop-info h1 {
        font-size: 28px;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .product-footer {
        flex-direction: column;
        align-items: stretch;
      }

      .product-actions {
        flex-direction: column;
      }

      .add-to-cart-btn,
      .quick-order-btn {
        width: 100%;
        justify-content: center;
      }

      .gallery-nav {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      .gallery-thumbs {
        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="shop-name">
        <span class="shop-icon">🛍️</span>
        <span id="headerShopName">Chargement...</span>
      </div>
      <div class="header-actions">
        <button class="cart-btn" onclick="openCart()">
          🛒
          <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
        </button>
        <button class="whatsapp-btn" id="headerWhatsApp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" fill="currentColor"/></svg>
          Contacter
        </button>
      </div>
    </div>
  </header>

  <div class="container">

    <div class="shop-info">
      <h1 id="shopNameDisplay">Chargement...</h1>
      <p id="shopDescription">Découvrez nos produits</p>
    </div>

    <div class="products-header">
      <h2 class="products-title">📦 Nos Produits</h2>
      <span class="products-count" id="productsCount">0 produit(s)</span>
    </div>

    <div class="category-filters" id="categoryFilters" style="display: none;"></div>

    <div id="productsContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>Chargement des produits...</p>
      </div>
    </div>

  </div>

  
  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">🛒 Mon Panier</h3>
        <button class="modal-close" onclick="closeCart()">×</button>
      </div>

      <div id="cartContent"></div>
    </div>
  </div>

  
  <div class="gallery-modal" id="galleryModal">
    <div class="gallery-content">
      <button class="gallery-close" onclick="closeGallery()">×</button>
      <div class="gallery-main">
        <img id="galleryImage" src="" alt="Produit">
        <button class="gallery-nav gallery-prev" onclick="prevImage()">‹</button>
        <button class="gallery-nav gallery-next" onclick="nextImage()">›</button>
        <div class="gallery-counter" id="galleryCounter">1 / 1</div>
      </div>
      <div class="gallery-thumbs" id="galleryThumbs"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 <span id="footerShopName"></span> - Tous droits réservés</p>
    <div class="powered-by">
      Propulsé par <strong>WhaBiz</strong>
    </div>
  </footer>

  <script src="boutique-cart.js"></script>
  <script src="chat-widget.js"></script>
  <script>
    
    var originalLoadShop = loadShop;
    loadShop = async function() {
      await originalLoadShop();
      if (window.chatWidget && vendeurData) {
        window.chatWidget.setVendeurData(vendeurData);
      }
    };
    loadShop();
  </script>
<script>
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('✅ Service Worker enregistré:', registration);
          })
          .catch((error) => {
            console.log('❌ Erreur Service Worker:', error);
          });
      });
    }

    
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      
      const installButton = document.createElement('div');
      installButton.innerHTML = `
        <div style="position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9998; background: linear-gradient(135deg, #0F9D58 0%, #D4AF37 100%); color: white; padding: 16px 24px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 10px; animation: slideUp 0.3s ease;">
          📱 Installer WhaBiz
        </div>
        <style>
          @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
          }
        </style>
      `;
      
      document.body.appendChild(installButton);
      
      installButton.onclick = async () => {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        
        if (outcome === 'accepted') {
          console.log('✅ PWA installée !');
        }
        
        installButton.remove();
        deferredPrompt = null;
      };
    });
  </script>
</body>
</html>
