name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Run smoke test
        run: npm --prefix backend run smoke

      - name: Run critical orders/payments test
        run: npm --prefix backend run test:critical

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Run Lighthouse CI
        run: npm run perf
        env:
          PERF_STRICT: "1"

      - name: Upload Lighthouse Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci
          if-no-files-found: ignore
